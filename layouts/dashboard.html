<div class="layout layout-dashboard" style="min-height:100vh; display:flex; background:#f1f5f9;">

  <!-- SIDEBAR -->
  <aside style="width:220px; background:#0f172a; color:white; padding:16px; display:flex; flex-direction:column; gap:10px;">

    <div style="font-weight:700; margin-bottom:10px;">
      Admin Panel
    </div>

    <button onclick="Runtime.navigate('home')" style="text-align:left;">Home</button>
    <button onclick="Runtime.navigate('dashboard')" style="text-align:left;">Dashboard</button>
    <button onclick="Runtime.navigate('settings')" style="text-align:left;">Settings</button>

    <div style="margin-top:auto;">
      <button onclick="AdminSystemCore.logout()">Logout</button>
    </div>

  </aside>

  <!-- MAIN AREA -->
  <div style="flex:1; display:flex; flex-direction:column;">

    <!-- TOP BAR -->
    <header style="padding:12px 16px; background:white; border-bottom:1px solid #e2e8f0;">
      Dashboard
    </header>

    <!-- CONTENT SLOT -->
    <main style="flex:1; padding:16px;">
      {{slot:main}}
    </main>

  </div>

</div>
